<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator</title>

    <!-- ✅ Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- JS File -->
    <script src="Emi.js"></script>

    <style>
        body {
            background-color: #f5f5f5;
        }
        .box {
            background-color: white;
            box-shadow: 0px 4px 10px gray;
            padding: 25px;
            border-radius: 10px;
        }
    </style>
</head>

<body class="container mt-5">

    <h2 class="text-center mb-4">💰 Personal Loan EMI Calculator</h2>

    <div class="box">

        <!-- Inputs -->
        <div class="row text-center">
            <div class="col-md-4">
                Amount ₹ <br>
                <input type="text" id="txtAmount" class="form-control"
                       onchange="AmountTextBoxChanged()">
            </div>

            <div class="col-md-4">
                Years <br>
                <input type="text" id="txtYears" class="form-control"
                       onchange="YearTextBoxChanged()">
            </div>

            <div class="col-md-4">
                Interest % <br>
                <input type="text" id="txtRate" class="form-control"
                       onchange="RateTextBoxChanged()">
            </div>
        </div>

        <!-- Sliders -->
        <div class="row mt-4 text-center">
            <div class="col-md-4">
                ₹50,000
                <input type="range" id="rangeAmount" class="form-range"
                       min="50000" max="1000000" value="50000"
                       onchange="AmountChange()">
                ₹10,00,000
            </div>

            <div class="col-md-4">
                1
                <input type="range" id="rangeYears" class="form-range"
                       min="1" max="5" value="1"
                       onchange="YearsChange()">
                5
            </div>

            <div class="col-md-4">
                10.25%
                <input type="range" id="rangeRate" class="form-range"
                       min="10.25" max="18.45" step="0.01" value="10.25"
                       onchange="RateChange()">
                18.45%
            </div>
        </div>

        <!-- Button -->
        <div class="text-center mt-4">
            <button onclick="CalculateClick()" class="btn btn-primary px-4">
                Calculate EMI
            </button>
        </div>

    </div>

    <!-- Result -->
    <p id="result" class="text-center mt-4 fs-4 fw-bold text-success"></p>

</body>
</html>
